services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: securebank-db
    environment:
      POSTGRES_DB: securebank
      POSTGRES_USER: bankadmin
      POSTGRES_PASSWORD: SecureBank2024!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankadmin -d securebank"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: securebank-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5



  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securebank-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://bankadmin:SecureBank2024!@postgres:5432/securebank
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
      - SECRET_KEY=your-secret-key-change-in-production
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
      - ./database/policies:/app/knowledge_base
      - chromadb_data:/app/chroma_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: securebank-web
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  redis_data:
  chromadb_data:

networks:
  default:
    name: securebank-network
