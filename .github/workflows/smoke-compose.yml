name: Compose Config Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compose-config:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENAI_API_KEY: test-key-for-ci
      OPENAI_MODEL: gpt-4o-mini
      LLM_MODEL: gpt-4o-mini
      PUBLIC_BASE_URL: http://localhost

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve compose command
        shell: bash
        run: |
          if docker compose version >/dev/null 2>&1; then
            echo "COMPOSE_CMD=docker compose" >> "$GITHUB_ENV"
          elif command -v docker-compose >/dev/null 2>&1; then
            echo "COMPOSE_CMD=docker-compose" >> "$GITHUB_ENV"
          else
            echo "Neither 'docker compose' nor 'docker-compose' is available" >&2
            exit 1
          fi

      - name: Normalize shell script line endings
        shell: bash
        run: |
          sed -i 's/\r$//' deploy/ec2/healthcheck.sh
          sed -i 's/\r$//' deploy/ec2/deploy.sh

      - name: Prepare CI env files for compose validation
        shell: bash
        run: |
          for lab in LAB-1 LAB-2 LAB-3 LAB-4 LAB-5; do
            if [ ! -f "$lab/.env" ] && [ -f "$lab/.env.example" ]; then
              cp "$lab/.env.example" "$lab/.env"
            fi
          done

      - name: Validate root compose
        shell: bash
        run: $COMPOSE_CMD -f docker-compose.yml config -q

      - name: Validate lab compose files
        shell: bash
        run: |
          set +e
          failed=0
          files=(
            "LAB-1/docker-compose.yml"
            "LAB-2/docker-compose.yml"
            "LAB-3/docker-compose.yml"
            "LAB-4/docker-compose.yml"
            "LAB-5/docker-compose.yml"
          )

          for file in "${files[@]}"; do
            output=$($COMPOSE_CMD -f "$file" config -q 2>&1)
            code=$?
            if [ $code -ne 0 ]; then
              failed=1
              one_line=$(echo "$output" | head -n 1)
              echo "::error file=$file,title=Compose validation failed::$one_line"
            fi
          done

          if [ $failed -ne 0 ]; then
            exit 1
          fi

      - name: Validate deploy health script syntax
        shell: bash
        run: |
          bash -n deploy/ec2/deploy.sh
          bash -n deploy/ec2/healthcheck.sh
