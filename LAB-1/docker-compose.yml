services:
  medassist:
    build: .
    container_name: medassist-lab
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
    volumes:
      # Persist database between restarts
      - ./database:/app/database
    restart: unless-stopped
