  lab5-frontend:
    build:
      context: ./LAB-5/frontend
      dockerfile: Dockerfile
    container_name: govconnect-frontend
    ports:
      - "3200:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL:-http://localhost}:8100
    depends_on:
      lab5-backend:
        condition: service_healthy
    networks:
      - technieum
    restart: unless-stopped
