version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lab3-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shopsec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopsec123}
      POSTGRES_DB: ${POSTGRES_DB:-shopsec_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopsec"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  lab3-agent:
    build:
      context: .
      dockerfile: backend/services/agent_core/Dockerfile
    container_name: lab3-agent
    ports:
      - "8083:8003"
    environment:
      DATABASE_URL: postgresql://shopsec:${POSTGRES_PASSWORD:-shopsec123}@postgres:5432/${POSTGRES_DB:-shopsec_db}
      ORDER_SERVICE_URL: http://lab3-order:8001
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8003

  lab3-order:
    build:
      context: .
      dockerfile: backend/services/order_service/Dockerfile
    container_name: lab3-order
    environment:
      DATABASE_URL: postgresql://shopsec:${POSTGRES_PASSWORD:-shopsec123}@postgres:5432/${POSTGRES_DB:-shopsec_db}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8001

  lab3-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lab3-gateway
    ports:
      - "8080:8000"
    environment:
      AGENT_SERVICE_URL: http://lab3-agent:8003
      ORDER_SERVICE_URL: http://lab3-order:8001
      SEARCH_SERVICE_URL: http://lab3-order:8001
      ADMIN_PASSWORD: ${LAB3_ADMIN_PASSWORD:-admin123}
    depends_on:
      lab3-agent:
        condition: service_healthy
      lab3-order:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  lab3-frontend:
    image: nginx:1.27-alpine
    container_name: lab3-ui
    ports:
      - "3001:80"
    volumes:
      - ./lite_frontend:/usr/share/nginx/html:ro
    depends_on:
      - lab3-gateway
    restart: unless-stopped

volumes:
  postgres_data:
